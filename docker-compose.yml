services:
  db:
    image: postgres:18-alpine
    container_name: tuna-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tuna}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tuna}
      POSTGRES_DB: ${POSTGRES_DB:-tuna}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tuna} -d ${POSTGRES_DB:-tuna}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
